services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: officeflow
      POSTGRES_USER: officeflow
      POSTGRES_PASSWORD: officeflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: officeflow
      MINIO_ROOT_PASSWORD: replace-me-minio-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
